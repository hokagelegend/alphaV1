server {
    listen 1010 proxy_protocol so_keepalive=on reuseport;
    set_real_ip_from 127.0.0.1;
    real_ip_header  proxy_protocol;
    server_name 127.0.0.1 localhost; 
    
    client_body_buffer_size 200K;
    client_header_buffer_size 2k;
    client_max_body_size 10M;
    large_client_header_buffers 3 1k;
    client_header_timeout 86400000m;
    keepalive_timeout 86400000m;
    add_header X-HTTP-LEVEL-HEADER 1;
    add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
    add_header X-XSS-Protection "1; mode=block";

    # =====================
    # 1. BLOCK HTTPUPGRADE 
    # =====================

    location ~ /vless-up {
        rewrite /(.*) /vless-up break;
        proxy_pass http://127.0.0.1:10009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ~ /vmess-up {
        rewrite /(.*) /vmess-up break;
        proxy_pass http://127.0.0.1:10010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ~ /trojan-up {
        rewrite /(.*) /trojan-up break;
        proxy_pass http://127.0.0.1:10011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ====================
    # 2. BLOCK WEBSOCKET 
    # ====================

    location ~ /vless {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /vless break; }
        add_header X-HTTP-LEVEL-HEADER 1;
        add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
        add_header X-SERVER-LEVEL-HEADER 1;
        add_header X-LOCATION-LEVEL-HEADER 1;
        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 128;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:10001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    location ~ /vmess {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /vmess break; }
        add_header X-HTTP-LEVEL-HEADER 1;
        add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
        add_header X-SERVER-LEVEL-HEADER 1;
        add_header X-LOCATION-LEVEL-HEADER 1;
        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 128;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:10002;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    } 

    location ~ /trojan-ws {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /trojan-ws break; }
        add_header X-HTTP-LEVEL-HEADER 1;
        add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
        add_header X-SERVER-LEVEL-HEADER 1;
        add_header X-LOCATION-LEVEL-HEADER 1;
        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 128;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:10003;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    location ~ /ss-ws {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /ss-ws break; }
        add_header X-HTTP-LEVEL-HEADER 1;
        add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
        add_header X-SERVER-LEVEL-HEADER 1;
        add_header X-LOCATION-LEVEL-HEADER 1;
        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 128;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:10004;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    # ====================
    # 3. CATCH ALL / SSH
    # ====================

    location ~ / {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /fightertunnelssh break; }
        add_header X-HTTP-LEVEL-HEADER 1;
        add_header X-ANOTHER-HTTP-LEVEL-HEADER 1;
        add_header X-SERVER-LEVEL-HEADER 1;
        add_header X-LOCATION-LEVEL-HEADER 1;
        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 128;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:10015;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }
}

# ==========================================
# --- SERVER OVPN (Port 1012) ---
# ==========================================
server {
    listen 1012 proxy_protocol so_keepalive=on reuseport;
    client_body_buffer_size 200K;
    client_header_buffer_size 2k;
    client_max_body_size 10M;
    large_client_header_buffers 3 1k;
    client_header_timeout 86400000m;
    keepalive_timeout 86400000m;
    server_name 127.0.0.1 localhost;

    location ~ / {
        if ($http_upgrade != "Websocket") { rewrite /(.*) /fightertunnelovpn break; }
